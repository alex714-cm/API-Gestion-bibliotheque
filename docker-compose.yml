version: '3.8'

services:
  # Database Service: Oracle XE 21c (Lightweight developer version)
  database:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: library-database
    ports:
      - "1522:1521"
    environment:
      - ORACLE_PASSWORD=sys
      - APP_USER=library
      - APP_USER_PASSWORD=sys
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always

  # Backend Service: Spring Boot Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@database:1521/XEPDB1
      - SPRING_DATASOURCE_USERNAME=library
      - SPRING_DATASOURCE_PASSWORD=sys
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      database:
        condition: service_healthy
    restart: always

  # Frontend Service: React App + Nginx Reverse Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: library-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  oracle-data:
