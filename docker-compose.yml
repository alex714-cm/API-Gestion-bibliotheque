version: '3.8'

services:
  # Backend Service: Spring Boot Application connecté à l'instance Oracle locale de l'hôte
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-backend
    ports:
      - "8080:8080"
    environment:
      # Connexion à l'instance Oracle locale (hôte Windows) via host.docker.internal
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@host.docker.internal:1521:xe
      - SPRING_DATASOURCE_USERNAME=library
      - SPRING_DATASOURCE_PASSWORD=sys
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # Frontend Service: React App + Nginx Reverse Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: library-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
